<!DOCTYPE html>-
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aula04.css"> 
    <title>Aula04 - Tela de Login</title>
</head>
<body>

    <div class="form-container">
        <h2>
        </h2>
        <p>Faça login para a sua conta</p>
        <form action="">
            <div class="input-group">
                <label for="E-mail>" id="email" placeholder="@seu@email.com">E-mail</label>
                <input type="email" id="email" placeholder="@seu@email.com" required>
            </div>
            <div class="input-group">
                <label for="Senha">Senha</label>
                <input type="password" id="senha" placeholder="Informe a sua senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <div class="footer-link">
            Não tem conta? <a href="">Cadastre-se</a>
        </div>

    </div>
    
</body>
</html>
